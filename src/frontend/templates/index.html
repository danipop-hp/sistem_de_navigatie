<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Urban Navigation Grid - Flask</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Urban Navigation System</h1>

<div id="grid"></div>

<div class="controls">
    <div class="button-group">
        <button onclick="setMode('obstacle')" class="btn-obs">Obstacle</button>
        <button onclick="setMode('start')" class="btn-start">Start</button>
        <button onclick="setMode('end')" class="btn-end">Destination</button>
    </div>
    <div class="action-group" style="margin-top: 10px;">
        <button onclick="calculatePath()" class="btn-calc">Calculate Path</button>
    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
