<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Navigatie Directa pe Harta</title>
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
    >
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
        }
        
        .panou {
            max-width: 1000px;
            margin: 16px auto 0;
            padding: 0 16px;
        }

        #map {
            height: 72vh;
            max-width: 1000px;
            margin: 12px auto 20px;
            border: 1px solid #cfd6dd;
            border-radius: 8px;
        }

        .mesaj {
            background: #ffffff;
            border: 1px solid #d9e0e8;
            border-radius: 8px;
            padding: 10px 12px;
            color: #1f2d3d;
        }

        .actiuni {
            margin-top: 10px;
            display: flex;
            gap: 8px;
        }

        button {
            border: none;
            background: #0b5ed7;
            color: white;
            padding: 9px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #0849a9;
        }
    </style>
</head>
<body
    data-centru-harta='{{ centru_harta | tojson | safe }}'
    data-traseu-initial='{{ traseu_initial | tojson | safe }}'
    data-serviciu-rutare-activ='{{ serviciu_rutare_activ | tojson | safe }}'
>
    <div class="panou">
        <h2>Navigatie directa pe harta</h2>
        <div id="status" class="mesaj">
            Click 1: Start, Click 2: Destinatie, Click 3: Reset. Ruta este calculata doar pe drumuri.
        </div>
        <div class="actiuni">
            <button id="resetBtn" type="button">Reset</button>
        </div>
    </div>
    <div id="map"></div>

    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
    ></script>
    <script>
        const centruHarta = JSON.parse(document.body.dataset.centruHarta);
        const traseuInitial = JSON.parse(document.body.dataset.traseuInitial);
        const serviciuRutareActiv = JSON.parse(document.body.dataset.serviciuRutareActiv);

        let punctStart = null;
        let punctFinal = null;
        let markerStart = null;
        let markerFinal = null;
        let traseuLayer = null;

        const statusEl = document.getElementById("status");

        const map = L.map("map").setView(centruHarta, 16);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            maxZoom: 19,
            attribution: "&copy; OpenStreetMap contributors"
        }).addTo(map);

        function actualizeazaStatus(text) {
            statusEl.textContent = text;
        }

        function reseteazaSelectia() {
            punctStart = null;
            punctFinal = null;

            if (markerStart) {
                map.removeLayer(markerStart);
                markerStart = null;
            }
            if (markerFinal) {
                map.removeLayer(markerFinal);
                markerFinal = null;
            }
            if (traseuLayer) {
                map.removeLayer(traseuLayer);
                traseuLayer = null;
            }

            actualizeazaStatus("Click 1: Start, Click 2: Destinatie, Click 3: Reset. Ruta este calculata doar pe drumuri.");
        }

        async function cereRuta() {
            const raspuns = await fetch("/calculeaza-ruta-harta", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ start: punctStart, end: punctFinal })
            });

            const date = await raspuns.json();
            if (!raspuns.ok) {
                throw new Error(date.message || "Nu s-a putut calcula ruta.");
            }

            if (traseuLayer) {
                map.removeLayer(traseuLayer);
            }

            traseuLayer = L.polyline(date.path_gps, {
                color: "#e63946",
                weight: 6,
                opacity: 0.85
            }).addTo(map);

            map.fitBounds(traseuLayer.getBounds(), { padding: [20, 20] });

            await fetch("/salveaza_ruta", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    path_gps: date.path_gps,
                    distance_m: date.distance_m,
                    duration_min: date.duration_min
                })
            });

            actualizeazaStatus(`Ruta calculata: ${date.distance_m} m, ~${date.duration_min} min. Click inca o data pe harta pentru reset.`);
        }

        map.on("click", async (event) => {
            if (!serviciuRutareActiv) {
                alert("Serviciul de rutare nu este activ. Verifica dependintele backend.");
                return;
            }

            const lat = event.latlng.lat;
            const lon = event.latlng.lng;

            if (!punctStart) {
                punctStart = { lat, lon };
                markerStart = L.marker([lat, lon]).addTo(map).bindPopup("Start").openPopup();
                actualizeazaStatus("Start setat. Alege acum destinatia pe un drum.");
                return;
            }

            if (!punctFinal) {
                punctFinal = { lat, lon };
                markerFinal = L.marker([lat, lon]).addTo(map).bindPopup("Destinatie");
                try {
                    await cereRuta();
                } catch (eroare) {
                    alert(eroare.message);
                    punctFinal = null;
                    if (markerFinal) {
                        map.removeLayer(markerFinal);
                        markerFinal = null;
                    }
                }
                return;
            }

            reseteazaSelectia();
        });

        if (Array.isArray(traseuInitial) && traseuInitial.length >= 2) {
            traseuLayer = L.polyline(traseuInitial, {
                color: "#e63946",
                weight: 6,
                opacity: 0.75
            }).addTo(map);
            map.fitBounds(traseuLayer.getBounds(), { padding: [20, 20] });
        }

        if (!serviciuRutareActiv) {
            actualizeazaStatus("Serviciul de rutare nu este activ. Instaleaza dependintele si ruleaza aplicatia cu internet la prima pornire.");
        }

        document.getElementById("resetBtn").addEventListener("click", reseteazaSelectia);
    </script>
</body>
</html>
